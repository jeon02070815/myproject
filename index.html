
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초등 4학년 기초학력 진단평가 - 당당수학</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- PDF 생성을 위한 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f1f5f9;
        }
        
        /* A4 규격 설정 (210mm x 297mm) */
        .pdf-page {
            width: 210mm;
            height: 296mm; /* 브라우저 오차 방지를 위해 1mm 줄임 */
            padding: 15mm 15mm;
            margin: 0 auto;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media print {
            @page {
                size: A4;
                margin: 0;
            }
            body {
                background: white;
            }
            .no-print {
                display: none !important;
            }
            .pdf-page {
                box-shadow: none;
                margin: 0;
                width: 210mm;
                height: 297mm;
                page-break-after: always;
            }
        }

        /* 문제 간격 미세 조정 */
        .question-item {
            margin-bottom: 6mm;
            padding-bottom: 4mm;
            border-bottom: 0.2mm dashed #eee;
        }
        
        .question-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .no-print {
            display: block;
        }

        /* 웹 화면용 스크롤 방지 */
        #pdf-export-container {
            position: absolute;
            left: -9999px;
            top: -9999px;
        }
    </style>
